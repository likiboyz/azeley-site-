<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Poster AZELEY">
  <defs>
    <radialGradient id="glow" cx="72%" cy="14%" r="70%">
      <stop offset="0%" stop-color="#C1121F" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#C1121F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gold" cx="12%" cy="92%" r="60%">
      <stop offset="0%" stop-color="#B89B5E" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#B89B5E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="slash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C1121F"/>
      <stop offset="100%" stop-color="#7a0c14"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="1200" height="1500" fill="#0D0D0D"/>
  <rect width="1200" height="1500" fill="url(#glow)"/>
  <rect width="1200" height="1500" fill="url(#gold)"/>

  <!-- Trame de lignes diagonales -->
  <g stroke="#F5F5F2" stroke-opacity="0.05" stroke-width="1">
    <path d="M-200 200 L1400 -200 M-200 400 L1400 0 M-200 600 L1400 200 M-200 800 L1400 400 M-200 1000 L1400 600 M-200 1200 L1400 800 M-200 1400 L1400 1000 M-200 1600 L1400 1200"/>
  </g>

  <!-- Slash rouge signature -->
  <polygon points="120,1500 360,1500 1000,0 760,0" fill="url(#slash)" opacity="0.16"/>

  <!-- Escargot des arrondissements (chiffres romains, spirale) -->
  <g font-family="Arial, sans-serif" font-size="34" fill="#F5F5F2" fill-opacity="0.22" text-anchor="middle">
    <text x="600" y="760">I</text>
    <text x="660" y="700">II</text>
    <text x="730" y="700">III</text>
    <text x="780" y="760">IV</text>
    <text x="760" y="840">V</text>
    <text x="680" y="880">VI</text>
    <text x="600" y="900">VII</text>
    <text x="520" y="880">VIII</text>
    <text x="470" y="820">IX</text>
    <text x="470" y="720">X</text>
    <text x="520" y="640">XI</text>
    <text x="620" y="600">XII</text>
    <text x="740" y="600">XIII</text>
    <text x="840" y="660">XIV</text>
    <text x="880" y="780">XV</text>
    <text x="860" y="900">XVI</text>
    <text x="760" y="980">XVII</text>
    <text x="600" y="1010">XVIII</text>
    <text x="450" y="970">XIX</text>
    <text x="380" y="800">XX</text>
  </g>
  <path d="M600 760 C520 720 470 800 520 860 C600 940 760 900 800 800 C840 660 660 560 520 620 C360 700 380 920 560 1000 C760 1080 980 940 940 740"
        fill="none" stroke="#C1121F" stroke-opacity="0.35" stroke-width="3" stroke-linecap="round"/>

  <!-- Monogramme AZ géant en filigrane -->
  <text x="600" y="430" font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="520"
        text-anchor="middle" fill="#F5F5F2" fill-opacity="0.04" letter-spacing="-20">AZ</text>

  <!-- Slogan -->
  <text x="600" y="1320" font-family="'Courier New', monospace" font-size="26" letter-spacing="6"
        text-anchor="middle" fill="#F5F5F2" fill-opacity="0.45">UN MAXIMUM POUR ETRE UN MINIMUM POUR DEVENIR</text>
  <line x1="480" y1="1360" x2="720" y2="1360" stroke="#C1121F" stroke-width="3"/>

  <!-- Grain -->
  <rect width="1200" height="1500" filter="url(#grain)" opacity="0.5"/>
</svg>
